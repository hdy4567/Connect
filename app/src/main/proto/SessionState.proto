syntax = "proto3";

package com.example.connect.proto;

option java_package = "com.example.connect.proto";
option java_multiple_files = true;

message SessionState {
    string device_id = 1;
    int64 timestamp = 2;
    AppState app_state = 3;
    DeviceInfo device_info = 4;
    string security_salt = 5; // phase 0.0101: Salt for security
    string security_hash = 6; // phase 0.0101: HMAC/Hash for security
}

enum AppState {
    IDLE = 0;
    MIRRORING = 1;
    EXPANSION = 2;
    CONTROL_ONLY = 3;
}

message DeviceInfo {
    int32 screen_width = 1;
    int32 screen_height = 2;
    int32 battery_level = 3;
    bool is_charging = 4;
}

message ControlVector {
    float x = 1;
    float y = 2;
    bool is_clicked = 3;
    int32 pressure = 4;
}
